<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Good Luck! - RGIT Tracker</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .exam-view {
            min-height: 100dvh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            background: radial-gradient(circle at top, #1c2533 0%, #050505 60%); 
            padding: 24px;
            text-align: center;
        }
        .container {
            width: 100%;
            max-width: 340px;
        }
        .logo-emoji {
            font-size: 3.5rem;
            margin-bottom: 24px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        h1 {
            font-size: 2rem;
            margin: 0 0 16px 0;
            font-weight: 700;
            color: var(--text-main);
        }
        .message {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 32px;
            font-size: 1rem;
        }
        .status-badge {
            display: inline-block;
            background: var(--green-bg);
            color: var(--green-text);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid rgba(63, 185, 80, 0.3);
        }
        .app-footer {
            position: absolute;
            bottom: 24px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.6;
        }
        .app-footer span {
            color: var(--accent);
            font-weight: 600;
        }
    </style>
</head>
<body style="padding-bottom: 0;">
    <div class="exam-view">
        <div class="container">
            <div class="logo-emoji">🍀</div>
            <h1>All the Best!</h1>
            <div class="message">
                <p>The 2nd semester has ended.</p>
                <p>Let's crush these exams together!</p>
            </div>
            <div class="status-badge">
                <i class="bi bi-rocket-takeoff"></i> 3rd Sem Tracker Coming Soon
            </div>
        </div>
        <div class="app-footer">
            Made with ❤️ by <span>Vaibhav</span>
            <br>Copyright &copy; 2026 Vaibhav Sable
        </div>
    </div>
</body>
</html>
